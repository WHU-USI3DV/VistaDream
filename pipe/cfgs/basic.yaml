name: basic

model:
  sky:
    keep: True
    value: 1e5 # to update
    mask2former:
      ckpt: "facebook/mask2former-swin-large-ade-semantic"
  vlm:
    llava:
      ckpt: 'llava-hf/bakLlava-v1-hf' # downloaded from hugging face
      offline: False # True: only load from local cache/path, no network access
  dpt:
    dpt_pro:
      ckpt: 'tools/DepthPro/checkpoints/depth_pro.pt'
    daprior:
      mde: 'tools/DAAnyPrior/checkpoints/depth_anything_v2_vitb.pth'
      dap: 'tools/DAAnyPrior/checkpoints/prior_depth_anything_vitb.pth'
    vggt:
      ckpt: 'tools/VGGT/checkpoints/model.pt'
  paint:
    fooocus:
      ckpts: 'tools/Fooocus/models'
  optimize:
    sd: 'sd-legacy/stable-diffusion-v1-5' # downloaded from hugging face
    lcm: 'tools/StableDiffusion/lcm_ckpt/pytorch_lora_weights.safetensors'

tools:
  preload: ['llava','rgb_inpaint','dpt_inpaint','mcs']

scene:
  input:
    rgb: 'nvknaonldm'
    rgbs: ['data/sd_readingroom/color.png','data/sd_readingroom/color.png'] # for sparse only
    resize_long_edge: 512

  inpaint:
    alpha_thres: 0.7

  outpaint:
    sign: True
    lvm_prompt: True
    outpaint_selections: ['Left','Right','Top','Bottom']
    outpaint_extend_times: 0.5
    seed: 16165035611626588888888
  
  reconstruction:
    type: 'mdi'
    keep_occlu: False
    edge_filter_times: 0.1

  traj: 
    n_sample: 10
    traj_type: 'spiral' # for 'rot' we suggest large n_sample like 25.
    near_percentage: 5
    far_percentage: 95
    traj_forward_ratio: 0.3
    traj_backward_ratio: 0.7

  gaussian:
    opt_iters_per_frame: 256
  
  mcs:
    total_steps: 50
    steps:  9 
    n_view: 8
    rect_w: 0.7
    gsopt_iters: 256
  
